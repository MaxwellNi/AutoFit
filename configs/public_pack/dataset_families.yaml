    display_name: ETT
    status: scaffold
    enabled: false
    variants: [ETTh1, ETTh2, ETTm1, ETTm2]
    task_type: multivariate_long_horizon
    representative_protocol:
      context_lengths: [96]
      prediction_lengths: [96, 192, 336, 720]
    verification_tier: official_source_verified
    official_source_signals: [SAMformer, DistDF, UniTS]
    dataset_roots:
      raw: data/public/ett/raw
