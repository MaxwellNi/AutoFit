metadata:
  name: public_pack_dataset_families
  version: "2026-04-09"
  status: policy_locked_research_only
  owner: single_model_true_champion_research
  official_source_doc: docs/references/single_model_true_champion/SINGLE_MODEL_TRUE_CHAMPION_OFFICIAL_SOURCE_FRONTIER_PACK_ZH_20260408.md
  subset_lock_doc: docs/references/single_model_true_champion/SINGLE_MODEL_TRUE_CHAMPION_PUBLIC_PACK_SUBSET_LOCK_ZH_20260409.md

guardrails:
  official_source_only: true
  local_results_are_research_only: true
  canonical_truth_doc: docs/CURRENT_SOURCE_OF_TRUTH.md
  notes:
    - Do not upgrade repo-tracked signals into official-source facts without a fresh official-page pass.
    - Do not treat local public-pack experiments as canonical benchmark truth.
    - Treat the locked M4/M5/Monash subset policy as research-only execution guidance, not as canonical truth.

packs:
  long_horizon_core:
    description: Repeated multivariate long-horizon family across recent official-source-verified papers.
    families: [ett, ecl, traffic, weather, exchange, ili, solar]
  traffic_graph_heavy:
    description: Traffic / graph-aware forecasting family with shorter horizon protocols.
    families: [pems]
  broad_robustness:
    description: Broader external robustness layer with a conservative research-only subset lock.
    families: [m4, m5, monash]

families:
